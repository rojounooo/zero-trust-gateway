static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO

                # ── Access Logging (JSON) ──────────────────────────────────────
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration_ms: "%DURATION%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          source_ip: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
                          user_agent: "%REQ(USER-AGENT)%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          authority: "%REQ(:AUTHORITY)%"
                          upstream_host: "%UPSTREAM_HOST%"
                          bytes_received: "%BYTES_RECEIVED%"
                          bytes_sent: "%BYTES_SENT%"
                          user_id: "%REQ(X-USER-ID)%"
                          user_role: "%REQ(X-USER-ROLE)%"

                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: fastapi_backend
                http_filters:

                  # ── 1. Lua: cookie → Authorization header ─────────────────────
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: "function envoy_on_request(request_handle)\n  local auth = request_handle:headers():get(\"authorization\")\n  if auth then\n    return\n  end\n  local cookie = request_handle:headers():get(\"cookie\")\n  if cookie then\n    local token = string.match(cookie, \"access_token=([^;]+)\")\n    if token then\n      request_handle:headers():add(\"authorization\", \"Bearer \" .. token)\n    end\n  end\nend\n"

                  # ── 2. JWT Validation ──────────────────────────────────────────
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        keycloak:
                          issuer: "http://<GATEWAY_IP>:8080/realms/hospital"
                          audiences:
                            - "fastapi-app"
                          remote_jwks:
                            http_uri:
                              uri: "http://<GATEWAY_IP>:8080/realms/hospital/protocol/openid-connect/certs"
                              cluster: keycloak_cluster
                              timeout: 5s
                            cache_duration:
                              seconds: 300
                          forward: true
                          forward_payload_header: "x-jwt-assertion"
                      rules:
                        - match:
                            prefix: "/login"
                          requires:
                            allow_missing_or_failed: {}

                        - match:
                            prefix: "/callback"
                          requires:
                            allow_missing_or_failed: {}

                        - match:
                            prefix: "/static"
                          requires:
                            allow_missing_or_failed: {}

                        - match:
                            prefix: "/"
                          requires:
                            provider_name: "keycloak"
                        
                        - match:
                            prefix: "/logout"
                          requires:
                            allow_missing_or_failed: {}

                  # ── 3. OPA External Authorization (gRPC) ──────────────────────
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      grpc_service:
                        envoy_grpc:
                          cluster_name: opa_grpc
                        timeout: 2s

                  # ── 4. Local Rate Limiter (per user identity) ─────────────────
                  # Runs AFTER OPA so x-user-id is already set in the request.
                  # Global bucket: 50 req/min fallback for unauthenticated paths.
                  # Descriptor bucket: 50 req/min per unique x-user-id value —
                  # each identity gets its own independent counter.
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: local_rate_limiter
                      # Global fallback bucket (unauthenticated / no x-user-id)
                      token_bucket:
                        max_tokens: 50
                        tokens_per_fill: 50
                        fill_interval: 60s
                      filter_enabled:
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append: false
                          header:
                            key: "x-ratelimit-limit"
                            value: "50"

                  # ── 5. Router ──────────────────────────────────────────────────
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # FastAPI webapp on VM2
    - name: fastapi_backend
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: fastapi_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: "<WEBAPP_IP>"
                      port_value: 8000

    # Keycloak — for JWKS public key fetching by the JWT filter
    - name: keycloak_cluster
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: keycloak_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: "<GATEWAY_IP>"
                      port_value: 8080

    # OPA — gRPC ext_authz plugin on port 9191, requires HTTP/2
    - name: opa_grpc
      connect_timeout: 1s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: opa_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: opa
                      port_value: 9191

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
